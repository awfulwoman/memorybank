services:
  frontend:
    build: ./frontend
    ports:
      - "8101:8101"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8102:8102"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-to-a-real-secret-key}
      - DJANGO_DEBUG=false
    volumes:
      - ./data/db:/data/db
      - ./data/media:/data/media


