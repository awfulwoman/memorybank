services:
  frontend:
    image: ghcr.io/awfulwoman/memorybank-frontend:latest
    ports:
      - "8101:8101"
    depends_on:
      - backend

  backend:
    image: ghcr.io/awfulwoman/memorybank-backend:latest
    ports:
      - "8102:8102"
    environment:
      - DJANGO_SETTINGS_MODULE=memorybank.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-to-a-real-secret-key}
      - DJANGO_DEBUG=false
      - DJANGO_ALLOWED_HOSTS=*
      - SQLITE_PATH=${SQLITE_PATH:-/data/db/db.sqlite3}
      - MEDIA_ROOT=${MEDIA_ROOT:-/data/media}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost}
    volumes:
      - ./data/db:/data/db
      - ./data/media:/data/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn memorybank.wsgi:application --bind 0.0.0.0:8000 --workers 2"


