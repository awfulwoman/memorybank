services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=memorybank.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-to-a-real-secret-key}
      - DJANGO_DEBUG=false
      - SQLITE_PATH=/data/db/db.sqlite3
      - MEDIA_ROOT=/data/media
      - DJANGO_ALLOWED_HOSTS=*
      - DJANGO_SECURE_SSL=false
    volumes:
      - ./data/db:/data/db
      - ./data/media:/data/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn memorybank.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
